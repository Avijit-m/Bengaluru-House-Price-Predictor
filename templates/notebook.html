<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Notebook - Bengaluru House Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        :root {
            --green: #22c55e;
            --green-dark: #16a34a;
            --blue: #0ea5e9;
            --bg: #060d1a;
            --surface: #0d1b2e;
            --surface2: #0f2340;
            --border: rgba(148, 163, 184, 0.1);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 50% 40% at 15% 10%, rgba(34,197,94,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 50% at 85% 80%, rgba(14,165,233,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {
            from { opacity: 0.6; }
            to   { opacity: 1; }
        }

        /* ── Navbar ── */
        .topbar {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: barIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 1px 0 rgba(34,197,94,0.08), 0 4px 20px rgba(0,0,0,0.4);
        }

        @keyframes barIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            padding: 6px 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .back-btn:hover {
            background: rgba(34,197,94,0.08);
            border-color: rgba(34,197,94,0.3);
            color: var(--green);
            transform: translateX(-2px);
        }

        .back-arrow {
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .back-btn:hover .back-arrow { transform: translateX(-3px); }

        .topbar-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--muted);
            text-align: center;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-title strong {
            font-weight: 500;
            color: rgba(226,232,240,0.7);
        }

        /* Step pills */
        .steps-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .step-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: 'Syne', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 4px 10px;
            white-space: nowrap;
        }

        .step-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
        }

        /* ── Iframe wrapper ── */
        .iframe-outer {
            position: relative;
            z-index: 1;
            height: calc(100vh - 60px);
            padding: 0;
            animation: iframeIn 0.7s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes iframeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .iframe-border {
            height: 100%;
            border-top: 1px solid var(--border);
            position: relative;
        }

        /* Green top accent line */
        .iframe-border::before {
            content: '';
            position: absolute;
            top: -1px; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            opacity: 0.6;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            background: #0b1120;
            display: block;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { opacity: 0; transform: translateY(0) scale(0); }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.15; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }

        /* Responsive: hide steps on small screens */
        @media (max-width: 640px) {
            .steps-row { display: none; }
            .topbar-title { display: none; }
        }
    </style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" aria-hidden="true">
    <div class="particle" style="width:3px;height:3px;background:var(--green);left:8%;animation-duration:20s;animation-delay:0s;"></div>
    <div class="particle" style="width:2px;height:2px;background:var(--blue);left:30%;animation-duration:25s;animation-delay:4s;"></div>
    <div class="particle" style="width:3px;height:3px;background:var(--green);left:55%;animation-duration:18s;animation-delay:8s;"></div>
    <div class="particle" style="width:2px;height:2px;background:var(--blue);left:78%;animation-duration:22s;animation-delay:2s;"></div>
    <div class="particle" style="width:2px;height:2px;background:rgba(34,197,94,0.5);left:92%;animation-duration:28s;animation-delay:11s;"></div>
</div>

<!-- Topbar -->
<nav class="topbar">
    <a class="back-btn" href="/">
        <span class="back-arrow">←</span> Back to Predictor
    </a>

    <span class="topbar-title">
        <strong>Notebook walkthrough</strong> &nbsp;·&nbsp; data cleaning, feature engineering &amp; model training
    </span>

    <div class="steps-row">
        <span class="step-pill"><span class="step-dot" style="background:#f59e0b;"></span> Data Cleaning</span>
        <span class="step-pill"><span class="step-dot" style="background:var(--blue);"></span> Features</span>
        <span class="step-pill"><span class="step-dot" style="background:var(--green);"></span> Training</span>
    </div>
</nav>

<!-- Notebook iframe -->
<div class="iframe-outer">
    <div class="iframe-border">
        <!--
          Export your Jupyter notebook to HTML (File → Download as → HTML)
          and save it as `notebook_export.html` in the same folder as app.py.
          This iframe will then show that HTML here.
        -->
        <iframe src="/static/notebook_export.html" title="Model Notebook"></iframe>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
